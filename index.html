<!DOCTYPE html>
<html lang="de">

<head>
    <title>PWA3</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            background-color: #ddd;
        }
    </style>
    <script type="module">
        import { JSxdb } from './jsxdb.js';

        async function run(params) {

            JSxdb.init('testdb', {
                1: {
                    'user': "@id, firstname, lastname",
                    'bla': "@id, firstname, lastname, !uuid"
                }
            }).then(db => db.close())

            try {
                const db = await JSxdb.open('testdb')
                const [store1, store2] = await db.readwrite('user', 'bla')
                store2.put({id:2, uuid:11})
                 console.log(await store2.getAll())
                db.close();
                
            } catch (ex) {
                console.error(ex)
            }
        }

        run()
    </script>
    <script type="modules">
        import('./test1.mjs?a=b')
        import('./test1.mjs?a=b')
        import('./test1.mjs?c=d')

        const main = async () => {
            await import('./dberta/dberta.js');
            const berta = await dberta.open('pwatest', {});
            const tx= await berta.write('strings');
            // tx.strings.put({
            //     id: 1, data: 'eins'
            // })
            console.log(await tx.strings.getAll())
        }

        const registerServiceWorker = async () => {
            try {
                await navigator.serviceWorker.register('sw.js');
            } catch (error) {
                console.error(`Registration failed with ${error}`);
            }
        }


        registerServiceWorker();
        main();

    </script>
</head>
